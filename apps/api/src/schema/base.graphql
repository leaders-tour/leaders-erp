scalar DateTime

type Query {
  health: String!
  regions: [Region!]!
  region(id: ID!): Region
  locations: [Location!]!
  location(id: ID!): Location
  locationVariations(locationId: ID!): [LocationVersion!]!
  locationVariation(id: ID!): LocationVersion
  safetyNotices: [SafetyNotice!]!
  safetyNotice(id: ID!): SafetyNotice
  locationGuides: [LocationGuide!]!
  locationGuide(id: ID!): LocationGuide
  lodgings: [Lodging!]!
  lodging(id: ID!): Lodging
  mealSets: [MealSet!]!
  mealSet(id: ID!): MealSet
  segments: [Segment!]!
  segment(id: ID!): Segment
  plans(userId: ID!): [Plan!]!
  plan(id: ID!): Plan
  planVersions(planId: ID!): [PlanVersion!]!
  planVersion(id: ID!): PlanVersion
  users: [User!]!
  user(id: ID!): User
  timeBlocks: [TimeBlock!]!
  timeBlock(id: ID!): TimeBlock
  activities: [Activity!]!
  activity(id: ID!): Activity
  overrides: [Override!]!
  override(id: ID!): Override
}

type Mutation {
  createRegion(input: RegionCreateInput!): Region!
  updateRegion(id: ID!, input: RegionUpdateInput!): Region!
  deleteRegion(id: ID!): Boolean!

  createLocation(input: LocationCreateInput!): Location!
  createLocationProfile(input: LocationProfileCreateInput!): Location!
  createLocationVariation(input: LocationVersionCreateInput!): LocationVersion!
  setDefaultLocationVersion(locationId: ID!, versionId: ID!): Location!
  updateLocationProfile(id: ID!, input: LocationProfileUpdateInput!): Location!
  updateLocation(id: ID!, input: LocationUpdateInput!): Location!
  deleteLocation(id: ID!): Boolean!
  createSafetyNotice(input: SafetyNoticeCreateInput!): SafetyNotice!
  updateSafetyNotice(id: ID!, input: SafetyNoticeUpdateInput!): SafetyNotice!
  deleteSafetyNotice(id: ID!): Boolean!
  createLocationGuide(input: LocationGuideCreateInput!): LocationGuide!
  updateLocationGuide(id: ID!, input: LocationGuideUpdateInput!): LocationGuide!
  deleteLocationGuide(id: ID!): Boolean!
  connectLocationGuide(locationId: ID!, guideId: ID!): LocationGuide!
  disconnectLocationGuide(locationId: ID!): LocationGuide

  createLodging(input: LodgingCreateInput!): Lodging!
  updateLodging(id: ID!, input: LodgingUpdateInput!): Lodging!
  deleteLodging(id: ID!): Boolean!

  createMealSet(input: MealSetCreateInput!): MealSet!
  updateMealSet(id: ID!, input: MealSetUpdateInput!): MealSet!
  deleteMealSet(id: ID!): Boolean!

  createSegment(input: SegmentCreateInput!): Segment!
  updateSegment(id: ID!, input: SegmentUpdateInput!): Segment!
  deleteSegment(id: ID!): Boolean!

  createUser(input: UserCreateInput!): User!
  updateUser(id: ID!, input: UserUpdateInput!): User!
  deleteUser(id: ID!): Boolean!

  createPlan(input: PlanCreateInput!): Plan!
  updatePlan(id: ID!, input: PlanUpdateInput!): Plan!
  createPlanVersion(input: PlanVersionCreateInput!): PlanVersion!
  setCurrentPlanVersion(planId: ID!, versionId: ID!): Plan!
  deletePlan(id: ID!): Boolean!

  createTimeBlock(input: TimeBlockCreateInput!): TimeBlock!
  updateTimeBlock(id: ID!, input: TimeBlockUpdateInput!): TimeBlock!
  deleteTimeBlock(id: ID!): Boolean!

  createActivity(input: ActivityCreateInput!): Activity!
  updateActivity(id: ID!, input: ActivityUpdateInput!): Activity!
  deleteActivity(id: ID!): Boolean!

  createOverride(input: OverrideCreateInput!): Override!
  updateOverride(id: ID!, input: OverrideUpdateInput!): Override!
  deleteOverride(id: ID!): Boolean!
}
