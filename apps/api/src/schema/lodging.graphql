type Lodging {
  id: ID!
  locationId: String!
  locationVersionId: String
  locationNameSnapshot: [String!]!
  name: String!
  specialNotes: String
  isUnspecified: Boolean!
  hasElectricity: FacilityAvailability!
  hasShower: FacilityAvailability!
  hasInternet: FacilityAvailability!
  createdAt: DateTime!
  updatedAt: DateTime!
  location: Location!
}

input LodgingCreateInput {
  locationId: String
  locationVersionId: String
  name: String!
  specialNotes: String
  isUnspecified: Boolean
  hasElectricity: FacilityAvailability
  hasShower: FacilityAvailability
  hasInternet: FacilityAvailability
}

input LodgingUpdateInput {
  locationId: String
  locationVersionId: String
  name: String
  specialNotes: String
  isUnspecified: Boolean
  hasElectricity: FacilityAvailability
  hasShower: FacilityAvailability
  hasInternet: FacilityAvailability
}
