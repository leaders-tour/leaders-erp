type Lodging {
  id: ID!
  locationId: String!
  locationNameSnapshot: String!
  name: String!
  specialNotes: String
  isUnspecified: Boolean!
  hasElectricity: Boolean!
  hasShower: Boolean!
  hasInternet: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!
  location: Location!
  planStops: [PlanStop!]!
}

input LodgingCreateInput {
  locationId: String!
  name: String!
  specialNotes: String
  isUnspecified: Boolean
  hasElectricity: Boolean
  hasShower: Boolean
  hasInternet: Boolean
}

input LodgingUpdateInput {
  locationId: String
  name: String
  specialNotes: String
  isUnspecified: Boolean
  hasElectricity: Boolean
  hasShower: Boolean
  hasInternet: Boolean
}
