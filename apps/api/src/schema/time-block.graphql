enum LocationTimeBlockProfile {
  DEFAULT
  FIRST_DAY
  FIRST_DAY_EARLY
}

type TimeBlock {
  id: ID!
  locationId: String!
  locationVersionId: String
  profile: LocationTimeBlockProfile!
  startTime: String!
  label: String!
  orderIndex: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
  location: Location!
  activities: [Activity!]!
}

input TimeBlockCreateInput {
  locationId: String
  locationVersionId: String
  profile: LocationTimeBlockProfile
  startTime: String!
  label: String!
  orderIndex: Int!
}

input TimeBlockUpdateInput {
  locationId: String
  locationVersionId: String
  profile: LocationTimeBlockProfile
  startTime: String
  label: String
  orderIndex: Int
}
