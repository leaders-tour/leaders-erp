type Segment {
  id: ID!
  regionId: String!
  regionName: String!
  fromLocationId: String!
  toLocationId: String!
  defaultVersionId: String
  averageDistanceKm: Float!
  averageTravelHours: Float!
  isLongDistance: Boolean!
  scheduleTimeBlocks: [SegmentTimeBlock!]!
  versions: [SegmentVersion!]!
  createdAt: DateTime!
  updatedAt: DateTime!
  region: Region!
  fromLocation: Location!
  toLocation: Location!
}

enum SegmentVersionKind {
  DIRECT
  VIA
}

type SegmentVersion {
  id: ID!
  segmentId: String!
  name: String!
  kind: SegmentVersionKind!
  averageDistanceKm: Float!
  averageTravelHours: Float!
  isLongDistance: Boolean!
  sortOrder: Int!
  isDefault: Boolean!
  viaLocations: [SegmentVersionViaLocation!]!
  scheduleTimeBlocks: [SegmentVersionTimeBlock!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type SegmentVersionViaLocation {
  id: ID!
  segmentVersionId: String!
  locationId: String!
  orderIndex: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type SegmentVersionTimeBlock {
  id: ID!
  segmentVersionId: String!
  startTime: String!
  label: String!
  orderIndex: Int!
  activities: [SegmentVersionActivity!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type SegmentVersionActivity {
  id: ID!
  segmentVersionTimeBlockId: String!
  description: String!
  orderIndex: Int!
  isOptional: Boolean!
  conditionNote: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

type SegmentTimeBlock {
  id: ID!
  segmentId: String!
  startTime: String!
  label: String!
  orderIndex: Int!
  activities: [SegmentActivity!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type SegmentActivity {
  id: ID!
  segmentTimeBlockId: String!
  description: String!
  orderIndex: Int!
  isOptional: Boolean!
  conditionNote: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

input SegmentTimeSlotInput {
  startTime: String!
  activities: [String!]!
}

input SegmentVersionInput {
  id: String
  name: String!
  kind: SegmentVersionKind!
  viaLocationIds: [String!]!
  averageDistanceKm: Float!
  averageTravelHours: Float!
  isLongDistance: Boolean!
  timeSlots: [SegmentTimeSlotInput!]!
  isDefault: Boolean
}

input SegmentCreateInput {
  regionId: String!
  fromLocationId: String!
  toLocationId: String!
  averageDistanceKm: Float!
  averageTravelHours: Float!
  isLongDistance: Boolean!
  timeSlots: [SegmentTimeSlotInput!]!
  versions: [SegmentVersionInput!]
}

input SegmentUpdateInput {
  regionId: String
  fromLocationId: String
  toLocationId: String
  averageDistanceKm: Float
  averageTravelHours: Float
  isLongDistance: Boolean
  timeSlots: [SegmentTimeSlotInput!]
  versions: [SegmentVersionInput!]
}
