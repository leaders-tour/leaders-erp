type Segment {
  id: ID!
  regionId: String!
  regionName: String!
  fromLocationId: String!
  toLocationId: String!
  averageDistanceKm: Float!
  averageTravelHours: Float!
  isLongDistance: Boolean!
  scheduleTimeBlocks: [SegmentTimeBlock!]!
  createdAt: DateTime!
  updatedAt: DateTime!
  region: Region!
  fromLocation: Location!
  toLocation: Location!
}

type SegmentTimeBlock {
  id: ID!
  segmentId: String!
  startTime: String!
  label: String!
  orderIndex: Int!
  activities: [SegmentActivity!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type SegmentActivity {
  id: ID!
  segmentTimeBlockId: String!
  description: String!
  orderIndex: Int!
  isOptional: Boolean!
  conditionNote: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

input SegmentTimeSlotInput {
  startTime: String!
  activities: [String!]!
}

input SegmentCreateInput {
  regionId: String!
  fromLocationId: String!
  toLocationId: String!
  averageDistanceKm: Float!
  averageTravelHours: Float!
  isLongDistance: Boolean!
  timeSlots: [SegmentTimeSlotInput!]!
}

input SegmentUpdateInput {
  regionId: String
  fromLocationId: String
  toLocationId: String
  averageDistanceKm: Float
  averageTravelHours: Float
  isLongDistance: Boolean
  timeSlots: [SegmentTimeSlotInput!]
}
