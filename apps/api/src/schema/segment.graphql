enum MovementIntensity {
  LEVEL_1
  LEVEL_2
  LEVEL_3
  LEVEL_4
  LEVEL_5
}

type Segment {
  id: ID!
  regionId: String!
  regionName: String!
  fromLocationId: String!
  toLocationId: String!
  defaultVersionId: String
  averageDistanceKm: Float!
  averageTravelHours: Float!
  movementIntensity: MovementIntensity!
  isLongDistance: Boolean!
  scheduleTimeBlocks: [SegmentTimeBlock!]!
  earlyScheduleTimeBlocks: [SegmentTimeBlock!]!
  extendScheduleTimeBlocks: [SegmentTimeBlock!]!
  earlyExtendScheduleTimeBlocks: [SegmentTimeBlock!]!
  versions: [SegmentVersion!]!
  createdAt: DateTime!
  updatedAt: DateTime!
  region: Region!
  fromLocation: Location!
  toLocation: Location!
}

enum SegmentScheduleVariant {
  basic
  early
  extend
  earlyExtend
}

type SegmentVersion {
  id: ID!
  segmentId: String!
  name: String!
  averageDistanceKm: Float!
  averageTravelHours: Float!
  movementIntensity: MovementIntensity!
  isLongDistance: Boolean!
  startDate: DateTime
  endDate: DateTime
  flightOutTimeBand: PricingTimeBand
  sortOrder: Int!
  isDefault: Boolean!
  scheduleTimeBlocks: [SegmentVersionTimeBlock!]!
  earlyScheduleTimeBlocks: [SegmentVersionTimeBlock!]!
  extendScheduleTimeBlocks: [SegmentVersionTimeBlock!]!
  earlyExtendScheduleTimeBlocks: [SegmentVersionTimeBlock!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type SegmentVersionTimeBlock {
  id: ID!
  segmentVersionId: String!
  variant: SegmentScheduleVariant!
  startTime: String!
  label: String!
  orderIndex: Int!
  activities: [SegmentVersionActivity!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type SegmentVersionActivity {
  id: ID!
  segmentVersionTimeBlockId: String!
  description: String!
  orderIndex: Int!
  isOptional: Boolean!
  conditionNote: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

type SegmentTimeBlock {
  id: ID!
  segmentId: String!
  variant: SegmentScheduleVariant!
  startTime: String!
  label: String!
  orderIndex: Int!
  activities: [SegmentActivity!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type SegmentActivity {
  id: ID!
  segmentTimeBlockId: String!
  description: String!
  orderIndex: Int!
  isOptional: Boolean!
  conditionNote: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

input SegmentTimeSlotInput {
  startTime: String!
  activities: [String!]!
}

input SegmentVersionInput {
  id: String
  name: String!
  averageDistanceKm: Float!
  averageTravelHours: Float!
  isLongDistance: Boolean!
  startDate: String
  endDate: String
  flightOutTimeBand: PricingTimeBand
  timeSlots: [SegmentTimeSlotInput!]!
  earlyTimeSlots: [SegmentTimeSlotInput!]
  extendTimeSlots: [SegmentTimeSlotInput!]
  earlyExtendTimeSlots: [SegmentTimeSlotInput!]
  isDefault: Boolean
}

input SegmentCreateInput {
  regionId: String!
  fromLocationId: String!
  toLocationId: String!
  averageDistanceKm: Float!
  averageTravelHours: Float!
  isLongDistance: Boolean!
  timeSlots: [SegmentTimeSlotInput!]!
  earlyTimeSlots: [SegmentTimeSlotInput!]
  extendTimeSlots: [SegmentTimeSlotInput!]
  earlyExtendTimeSlots: [SegmentTimeSlotInput!]
  versions: [SegmentVersionInput!]
}

input SegmentUpdateInput {
  regionId: String
  fromLocationId: String
  toLocationId: String
  averageDistanceKm: Float
  averageTravelHours: Float
  isLongDistance: Boolean
  timeSlots: [SegmentTimeSlotInput!]
  earlyTimeSlots: [SegmentTimeSlotInput!]
  extendTimeSlots: [SegmentTimeSlotInput!]
  earlyExtendTimeSlots: [SegmentTimeSlotInput!]
  versions: [SegmentVersionInput!]
}
