type OvernightStay {
  id: ID!
  regionId: String!
  locationId: String!
  name: String!
  title: String!
  isActive: Boolean!
  sortOrder: Int!
  region: Region!
  location: Location!
  days: [OvernightStayDay!]!
  outgoingConnections: [OvernightStayConnection!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type OvernightStayDay {
  id: ID!
  overnightStayId: String!
  dayOrder: Int!
  averageDistanceKm: Float!
  averageTravelHours: Float!
