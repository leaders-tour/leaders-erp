  earlyScheduleTimeBlocks: [OvernightStayConnectionTimeBlock!]!
  extendScheduleTimeBlocks: [OvernightStayConnectionTimeBlock!]!
  earlyExtendScheduleTimeBlocks: [OvernightStayConnectionTimeBlock!]!
