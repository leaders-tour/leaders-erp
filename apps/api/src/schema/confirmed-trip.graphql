enum ConfirmedTripStatus {
  ACTIVE
  CANCELLED
}

type ConfirmedTrip {
  id: ID!
  userId: String!
  planId: String
  planVersionId: String
  status: ConfirmedTripStatus!
  confirmedAt: DateTime!
  confirmedByEmployeeId: String

  guideName: String
  driverName: String
  assignedVehicle: String
  accommodationNote: String
  operationNote: String

  travelStart: DateTime
  travelEnd: DateTime
  destination: String
  paxCount: Int
  guideId: String
  driverId: String
  rentalGear: Boolean!
  rentalDrone: Boolean!
  rentalStarlink: Boolean!
  rentalPowerbank: Boolean!

  depositAmountKrw: Int
  balanceAmountKrw: Int
  totalAmountKrw: Int
  securityDepositAmountKrw: Int
  groupTotalAmountKrw: Int

  user: User!
  plan: Plan
  planVersion: PlanVersion
  confirmedByEmployee: Employee
  guide: Guide
  driver: Driver

  createdAt: DateTime!
  updatedAt: DateTime!
}

input ConfirmTripInput {
  planId: ID!
  planVersionId: ID!
  confirmedByEmployeeId: ID
}

input ConfirmedTripUpdateInput {
  guideName: String
  driverName: String
  assignedVehicle: String
  accommodationNote: String
  operationNote: String
  status: ConfirmedTripStatus
  travelStart: DateTime
  travelEnd: DateTime
  destination: String
  paxCount: Int
  guideId: ID
  driverId: ID
  rentalGear: Boolean
  rentalDrone: Boolean
  rentalStarlink: Boolean
  rentalPowerbank: Boolean
  depositAmountKrw: Int
  balanceAmountKrw: Int
  totalAmountKrw: Int
  securityDepositAmountKrw: Int
  groupTotalAmountKrw: Int
}
