enum ConfirmedTripStatus {
  ACTIVE
  CANCELLED
}

enum LodgingAssignmentType {
  ACCOMMODATION
  LV1
  LV2
  LV3
  LV4
  NIGHT_TRAIN
  CUSTOM_TEXT
}

enum LodgingBookingStatus {
  PENDING
  REQUESTED
  CONFIRMED
  CANCELLED
}

type LodgingConflictWarning {
  conflictingTripId: String!
  conflictingTripLeaderName: String!
  overlapStartDate: DateTime!
  overlapEndDate: DateTime!
}

type ConfirmedTripLodging {
  id: ID!
  confirmedTripId: String!
  dayIndex: Int!
  checkInDate: DateTime!
  checkOutDate: DateTime!
  nights: Int!
  type: LodgingAssignmentType!
  accommodationId: String
  accommodationOptionId: String
  accommodation: Accommodation
  lodgingNameSnapshot: String!
  roomCount: Int!
  bookingStatus: LodgingBookingStatus!
  bookingMemo: String
  bookingReference: String
  conflictWarnings: [LodgingConflictWarning!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type ConfirmedTrip {
  id: ID!
  userId: String!
  planId: String
  planVersionId: String
  status: ConfirmedTripStatus!
  confirmedAt: DateTime!
  confirmedByEmployeeId: String

  guideName: String
  driverName: String
  assignedVehicle: String
  accommodationNote: String
  operationNote: String

  travelStart: DateTime
  travelEnd: DateTime
  destination: String
  paxCount: Int
  guideId: String
  driverId: String
  rentalGear: Boolean!
  rentalDrone: Boolean!
  rentalStarlink: Boolean!
  rentalPowerbank: Boolean!
  camelDollPurchased: Boolean!

  depositAmountKrw: Int
  balanceAmountKrw: Int
  totalAmountKrw: Int
  securityDepositAmountKrw: Int
  groupTotalAmountKrw: Int

  user: User!
  plan: Plan
  planVersion: PlanVersion
  confirmedByEmployee: Employee
  guide: Guide
  driver: Driver
  lodgings: [ConfirmedTripLodging!]!

  createdAt: DateTime!
  updatedAt: DateTime!
}

input ConfirmTripInput {
  planId: ID!
  planVersionId: ID!
  confirmedByEmployeeId: ID
}

input ConfirmedTripUpdateInput {
  guideName: String
  driverName: String
  assignedVehicle: String
  accommodationNote: String
  operationNote: String
  status: ConfirmedTripStatus
  travelStart: DateTime
  travelEnd: DateTime
  destination: String
  paxCount: Int
  guideId: ID
  driverId: ID
  rentalGear: Boolean
  rentalDrone: Boolean
  rentalStarlink: Boolean
  rentalPowerbank: Boolean
  camelDollPurchased: Boolean
  depositAmountKrw: Int
  balanceAmountKrw: Int
  totalAmountKrw: Int
  securityDepositAmountKrw: Int
  groupTotalAmountKrw: Int
}

input ConfirmedTripLodgingUpsertInput {
  id: ID
  confirmedTripId: ID!
  dayIndex: Int!
  checkInDate: DateTime!
  checkOutDate: DateTime!
  type: LodgingAssignmentType!
  accommodationId: String
  accommodationOptionId: String
  lodgingNameSnapshot: String!
  pricePerNightKrw: Int
  roomCount: Int!
  bookingStatus: LodgingBookingStatus
  bookingMemo: String
  bookingReference: String
}
