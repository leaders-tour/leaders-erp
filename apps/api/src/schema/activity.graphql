type Activity {
  id: ID!
  timeBlockId: String!
  description: String!
  orderIndex: Int!
  isOptional: Boolean!
  conditionNote: String
  safetyGuidelinesMd: String
  createdAt: DateTime!
  updatedAt: DateTime!
  timeBlock: TimeBlock!
}

input ActivityCreateInput {
  timeBlockId: String!
  description: String!
  orderIndex: Int!
  isOptional: Boolean
  conditionNote: String
  safetyGuidelinesMd: String
}

input ActivityUpdateInput {
  timeBlockId: String
  description: String
  orderIndex: Int
  isOptional: Boolean
  conditionNote: String
  safetyGuidelinesMd: String
}
