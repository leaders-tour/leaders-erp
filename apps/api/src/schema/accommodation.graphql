enum AccommodationLevel {
  LV2
  LV3
  LV4
  LV5
}

enum PaymentMethod {
  PER_PERSON
  PER_ROOM
}

type Accommodation {
  id: ID!
  name: String!
  destination: String!
  region: String!
  phone: String
  facilities: String
  bookingMethod: String
  openingDate: String
  closingDate: String
  options: [AccommodationOption!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type AccommodationOption {
  id: ID!
  accommodationId: ID!
  accommodation: Accommodation!
  roomType: String!
  level: AccommodationLevel!
  priceOffSeason: Int
  pricePeakSeason: Int
  paymentMethod: PaymentMethod
  mealCostPerServing: Int
  capacity: String
  mealIncluded: Boolean!
  bookingPriority: String
  googleMapsUrl: String
  imageUrls: [String!]!
  note: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

input AccommodationCreateInput {
  name: String!
  destination: String!
  region: String!
  phone: String
  facilities: String
  bookingMethod: String
  openingDate: String
  closingDate: String
}

input AccommodationUpdateInput {
  name: String
  destination: String
  region: String
  phone: String
  facilities: String
  bookingMethod: String
  openingDate: String
  closingDate: String
}

input AccommodationOptionCreateInput {
  accommodationId: ID!
  roomType: String!
  level: AccommodationLevel
  priceOffSeason: Int
  pricePeakSeason: Int
  paymentMethod: PaymentMethod
  mealCostPerServing: Int
  capacity: String
  mealIncluded: Boolean
  bookingPriority: String
  googleMapsUrl: String
  imageUrls: [String!]
  note: String
}

input AccommodationOptionUpdateInput {
  roomType: String
  level: AccommodationLevel
  priceOffSeason: Int
  pricePeakSeason: Int
  paymentMethod: PaymentMethod
  mealCostPerServing: Int
  capacity: String
  mealIncluded: Boolean
  bookingPriority: String
  googleMapsUrl: String
  imageUrls: [String!]
  note: String
}

extend type Mutation {
  uploadAccommodationOptionImages(id: ID!, images: [Upload!]!): AccommodationOption!
  removeAccommodationOptionImage(id: ID!, imageUrl: String!): AccommodationOption!
}
