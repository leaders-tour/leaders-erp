enum MealOption {
  CAMP_MEAL
  LOCAL_RESTAURANT
  PORK_PARTY
  HORHOG
  SHASHLIK
  SHABU_SHABU
}

type MealSet {
  id: ID!
  locationId: String!
  locationVersionId: String
  locationNameSnapshot: String!
  setName: String!
  breakfast: MealOption
  lunch: MealOption
  dinner: MealOption
  createdAt: DateTime!
  updatedAt: DateTime!
  location: Location!
}

input MealSetCreateInput {
  locationId: String
  locationVersionId: String
  setName: String!
  breakfast: MealOption
  lunch: MealOption
  dinner: MealOption
}

input MealSetUpdateInput {
  locationId: String
  locationVersionId: String
  setName: String
  breakfast: MealOption
  lunch: MealOption
  dinner: MealOption
}
