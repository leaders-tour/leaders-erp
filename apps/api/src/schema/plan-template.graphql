type PlanTemplate {
  id: ID!
  name: String!
  description: String
  regionSetId: String!
  totalDays: Int!
  sortOrder: Int!
  isActive: Boolean!
  regionSet: RegionSet!
  movementIntensity: MovementIntensity
  planStops: [PlanTemplateStop!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type PlanTemplateStop {
  id: ID!
  planTemplateId: String!
  dayIndex: Int!
  segmentId: String
  segmentVersionId: String
  multiDayBlockId: String
  multiDayBlockDayOrder: Int
  multiDayBlockConnectionId: String
  multiDayBlockConnectionVersionId: String
  locationId: String
  locationVersionId: String
  dateCellText: String!
  destinationCellText: String!
  movementIntensity: MovementIntensity
  timeCellText: String!
  scheduleCellText: String!
  lodgingCellText: String!
  mealCellText: String!
  createdAt: DateTime!
  updatedAt: DateTime!
  location: Location
  locationVersion: LocationVersion
}

input PlanTemplateStopNestedInput {
  dayIndex: Int!
  segmentId: String
  segmentVersionId: String
  multiDayBlockId: String
  multiDayBlockDayOrder: Int
  multiDayBlockConnectionId: String
  multiDayBlockConnectionVersionId: String
  locationId: String
  locationVersionId: String
  dateCellText: String!
  destinationCellText: String!
  timeCellText: String!
  scheduleCellText: String!
  lodgingCellText: String!
  mealCellText: String!
}

input PlanTemplateCreateInput {
  name: String!
  description: String
  regionSetId: ID!
  totalDays: Int!
  sortOrder: Int
  isActive: Boolean
  planStops: [PlanTemplateStopNestedInput!]!
}

input PlanTemplateUpdateInput {
  name: String
  description: String
  regionSetId: ID
  totalDays: Int
  sortOrder: Int
  isActive: Boolean
  planStops: [PlanTemplateStopNestedInput!]
}
