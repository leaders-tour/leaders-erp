type PricingPolicy {
  id: ID!
  """내부 DB 유일키(자동 생성). 클라이언트 식별·표시는 id·name을 사용합니다."""
  code: String!
  name: String!
  status: PricingPolicyStatus!
  effectiveFrom: DateTime!
  effectiveTo: DateTime
  rules: [PricingRule!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type PricingRule {
  id: ID!
  policyId: String!
  ruleType: PricingRuleType!
  title: String!
  lineCode: PricingLineCode!
  calcType: PricingCalcType!
  targetLineCode: PricingLineCode
  amountKrw: Int
  percentBps: Int
  quantitySource: PricingQuantitySource!
  lodgingSelectionLevel: PricingLodgingSelectionLevel
  headcountMin: Int
  headcountMax: Int
  dayMin: Int
  dayMax: Int
  travelDateFrom: DateTime
  travelDateTo: DateTime
  vehicleType: String
  variantTypes: [VariantType!]!
  flightInTimeBand: PricingTimeBand
  flightOutTimeBand: PricingTimeBand
  pickupPlaceType: PlaceType
  dropPlaceType: PlaceType
  externalTransferMode: PricingExternalTransferMode
  externalTransferMinCount: Int
  externalTransferPresetCodes: [ExternalTransferPresetCode!]!
  chargeScope: PricingChargeScope
  personMode: PricingPersonMode
  customDisplayText: String
  isEnabled: Boolean!
  sortOrder: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
}

input PricingPolicyCreateInput {
  name: String!
  status: PricingPolicyStatus
  effectiveFrom: DateTime!
  effectiveTo: DateTime
}

input PricingPolicyUpdateInput {
  name: String
  status: PricingPolicyStatus
  effectiveFrom: DateTime
  effectiveTo: DateTime
}

input PricingPolicyDuplicateInput {
  name: String!
  status: PricingPolicyStatus
  effectiveFrom: DateTime
  effectiveTo: DateTime
}

input PricingRuleCreateInput {
  policyId: ID!
  ruleType: PricingRuleType!
  title: String!
  amountKrw: Int
  percentBps: Int
  quantitySource: PricingQuantitySource!
  lodgingSelectionLevel: PricingLodgingSelectionLevel
  headcountMin: Int
  headcountMax: Int
  dayMin: Int
  dayMax: Int
  travelDateFrom: DateTime
  travelDateTo: DateTime
  vehicleType: String
  variantTypes: [VariantType!]
  flightInTimeBand: PricingTimeBand
  flightOutTimeBand: PricingTimeBand
  pickupPlaceType: PlaceType
  dropPlaceType: PlaceType
  externalTransferMode: PricingExternalTransferMode
  externalTransferMinCount: Int
  externalTransferPresetCodes: [ExternalTransferPresetCode!]
  chargeScope: PricingChargeScope
  personMode: PricingPersonMode
  customDisplayText: String
  isEnabled: Boolean
  sortOrder: Int
}

input PricingRuleUpdateInput {
  ruleType: PricingRuleType
  title: String
  amountKrw: Int
  percentBps: Int
  quantitySource: PricingQuantitySource
  lodgingSelectionLevel: PricingLodgingSelectionLevel
  headcountMin: Int
  headcountMax: Int
  dayMin: Int
  dayMax: Int
  travelDateFrom: DateTime
  travelDateTo: DateTime
  vehicleType: String
  variantTypes: [VariantType!]
  flightInTimeBand: PricingTimeBand
  flightOutTimeBand: PricingTimeBand
  pickupPlaceType: PlaceType
  dropPlaceType: PlaceType
  externalTransferMode: PricingExternalTransferMode
  externalTransferMinCount: Int
  externalTransferPresetCodes: [ExternalTransferPresetCode!]
  chargeScope: PricingChargeScope
  personMode: PricingPersonMode
  customDisplayText: String
  isEnabled: Boolean
  sortOrder: Int
}

enum PricingPolicyStatus {
  ACTIVE
  INACTIVE
}

enum PricingCalcType {
  AMOUNT
  PERCENT_OF_LINE
}

enum PricingRuleType {
  BASE
  PERCENT_UPLIFT
  CONDITIONAL_ADDON
  LONG_DISTANCE
  AUTO_EXCEPTION
  MANUAL
}

enum PricingQuantitySource {
  ONE
  HEADCOUNT
  TOTAL_DAYS
  LONG_DISTANCE_SEGMENT_COUNT
  NIGHT_TRAIN_BLOCK_COUNT
  SUM_EXTRA_LODGING_COUNTS
}

enum PricingChargeScope {
  TEAM
  PER_PERSON
}

enum PricingPersonMode {
  SINGLE
  PER_DAY
  PER_NIGHT
}

enum PricingLodgingSelectionLevel {
  LV1
  LV2
  LV4
}

enum PricingTimeBand {
  DAWN
  MORNING
  AFTERNOON
  EVENING
  NIGHT
}

enum PricingExternalTransferMode {
  ANY
  PICKUP_ONLY
  DROP_ONLY
  BOTH
}
