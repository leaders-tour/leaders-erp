type Event {
  id: ID!
  name: String!
  isActive: Boolean!
  securityDepositKrw: Int!
  sortOrder: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
}

input EventCreateInput {
  name: String!
  isActive: Boolean
  securityDepositKrw: Int
  sortOrder: Int
}

input EventUpdateInput {
  name: String
  isActive: Boolean
  securityDepositKrw: Int
  sortOrder: Int
}
