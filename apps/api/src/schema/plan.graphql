type Plan {
  id: ID!
  regionId: String!
  variantType: VariantType!
  totalDays: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
  region: Region!
  planStops: [PlanStop!]!
  overrides: [Override!]!
}

input PlanCreateInput {
  regionId: String!
  variantType: VariantType!
  totalDays: Int!
  planStops: [PlanStopNestedInput!]!
}

input PlanUpdateInput {
  variantType: VariantType
  totalDays: Int
  planStops: [PlanStopNestedInput!]
}

type PlanStop {
  id: ID!
  planId: String!
  dayIndex: Int!
  fromLocationId: String!
  toLocationId: String!
  lodgingId: String
  mealSetId: String
  distanceText: String!
  lodgingText: String!
  mealsText: String!
  createdAt: DateTime!
  updatedAt: DateTime!
  lodging: Lodging
  mealSet: MealSet
  fromLocation: Location!
  toLocation: Location!
}

input PlanStopNestedInput {
  dayIndex: Int!
  fromLocationId: String!
  toLocationId: String!
  lodgingId: String
  mealSetId: String
  distanceText: String!
  lodgingText: String!
  mealsText: String!
}
