type User {
  id: ID!
  name: String!
  email: String
  dealStage: DealStage!
  dealStageOrder: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
  plans: [Plan!]!
}

type UserNote {
  id: ID!
  userId: String!
  content: String!
  createdBy: String!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Plan {
  id: ID!
  userId: String!
  regionId: String!
  title: String!
  currentVersionId: String
  createdAt: DateTime!
  updatedAt: DateTime!
  user: User!
  region: Region!
  currentVersion: PlanVersion
  versions: [PlanVersion!]!
}

type PlanVersion {
  id: ID!
  planId: String!
  parentVersionId: String
  versionNumber: Int!
  variantType: VariantType!
  totalDays: Int!
  changeNote: String
  createdAt: DateTime!
  updatedAt: DateTime!
  plan: Plan!
  parentVersion: PlanVersion
  childVersions: [PlanVersion!]!
  meta: PlanVersionMeta
  pricing: PlanVersionPricing
  planStops: [PlanStop!]!
  overrides: [Override!]!
}

type PlanVersionMeta {
  id: ID!
  planVersionId: String!
  leaderName: String!
  documentNumber: String!
  travelStartDate: DateTime!
  travelEndDate: DateTime!
  headcountTotal: Int!
  headcountMale: Int!
  headcountFemale: Int!
  vehicleType: String!
  flightInTime: String!
  flightOutTime: String!
  pickupDropNote: String
  externalPickupDropNote: String
  includeRentalItems: Boolean!
  rentalItemsText: String!
  events: [Event!]!
  extraLodgings: [ExtraLodging!]!
  remark: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

type ExtraLodging {
  dayIndex: Int!
  lodgingCount: Int!
}

type PlanVersionPricing {
  id: ID!
  planVersionId: String!
  policyId: String!
  currencyCode: String!
  baseAmountKrw: Int!
  addonAmountKrw: Int!
  totalAmountKrw: Int!
  depositAmountKrw: Int!
  balanceAmountKrw: Int!
  securityDepositAmountKrw: Int!
  securityDepositUnitPriceKrw: Int!
  securityDepositQuantity: Int!
  securityDepositMode: SecurityDepositMode!
  securityDepositEvent: Event
  longDistanceSegmentCount: Int!
  extraLodgingCount: Int!
  lines: [PlanPricingLine!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type PlanPricingPreview {
  policyId: String!
  currencyCode: String!
  baseAmountKrw: Int!
  addonAmountKrw: Int!
  totalAmountKrw: Int!
  depositAmountKrw: Int!
  balanceAmountKrw: Int!
  securityDepositAmountKrw: Int!
  securityDepositUnitPriceKrw: Int!
  securityDepositQuantity: Int!
  securityDepositMode: SecurityDepositMode!
  securityDepositEvent: Event
  longDistanceSegmentCount: Int!
  extraLodgingCount: Int!
  lines: [PlanPricingLine!]!
}

type PlanPricingLine {
  id: ID
  lineCode: PricingLineCode!
  sourceType: PricingLineSourceType!
  description: String
  ruleId: String
  unitPriceKrw: Int
  quantity: Int!
  amountKrw: Int!
}

enum PricingLineCode {
  BASE
  BASE_UPLIFT_5PLUS_5PCT
  BASE_UPLIFT_5PLUS_10PCT
  LONG_DISTANCE
  HIACE
  EXTRA_LODGING
  EARLY_NIGHT
  EARLY_MORNING
  EXTEND
  MANUAL_ADJUSTMENT
}

enum PricingLineSourceType {
  RULE
  MANUAL
}

enum SecurityDepositMode {
  NONE
  PER_PERSON
  PER_TEAM
}

enum DealStage {
  CONSULTING
  CONTRACTING
  CONTRACT_CONFIRMED
  MONGOL_ASSIGNING
  MONGOL_ASSIGNED
  ON_HOLD
  BEFORE_DEPARTURE_10D
  BEFORE_DEPARTURE_3D
  TRIP_COMPLETED
}

input PlanCreateInput {
  userId: String!
  regionId: String!
  title: String!
  initialVersion: PlanVersionSeedInput!
}

input PlanVersionSeedInput {
  variantType: VariantType!
  totalDays: Int!
  planStops: [PlanStopNestedInput!]!
  changeNote: String
  meta: PlanVersionMetaInput!
  manualAdjustments: [ManualAdjustmentInput!]
  manualDepositAmountKrw: Int
}

input PlanUpdateInput {
  title: String
  currentVersionId: String
}

input PlanVersionCreateInput {
  planId: String!
  parentVersionId: String
  variantType: VariantType!
  totalDays: Int!
  planStops: [PlanStopNestedInput!]!
  changeNote: String
  meta: PlanVersionMetaInput!
  manualAdjustments: [ManualAdjustmentInput!]
  manualDepositAmountKrw: Int
}

input PlanVersionMetaInput {
  leaderName: String!
  travelStartDate: DateTime!
  travelEndDate: DateTime!
  headcountTotal: Int!
  headcountMale: Int!
  headcountFemale: Int!
  vehicleType: String!
  flightInTime: String!
  flightOutTime: String!
  pickupDropNote: String
  externalPickupDropNote: String
  includeRentalItems: Boolean!
  rentalItemsText: String!
  eventIds: [ID!]!
  extraLodgings: [ExtraLodgingInput!]!
  remark: String
}

input ExtraLodgingInput {
  dayIndex: Int!
  lodgingCount: Int!
}

input ManualAdjustmentInput {
  description: String!
  amountKrw: Int!
}

input PlanPricingPreviewInput {
  regionId: String!
  variantType: VariantType!
  totalDays: Int!
  planStops: [PlanStopNestedInput!]!
  travelStartDate: DateTime!
  headcountTotal: Int!
  vehicleType: String!
  includeRentalItems: Boolean!
  eventIds: [ID!]!
  extraLodgings: [ExtraLodgingInput!]
  manualAdjustments: [ManualAdjustmentInput!]
  manualDepositAmountKrw: Int
}

type PlanStop {
  id: ID!
  planVersionId: String!
  locationId: String
  locationVersionId: String
  dateCellText: String!
  destinationCellText: String!
  timeCellText: String!
  scheduleCellText: String!
  lodgingCellText: String!
  mealCellText: String!
  createdAt: DateTime!
  updatedAt: DateTime!
}

input PlanStopNestedInput {
  locationId: String
  locationVersionId: String
  dateCellText: String!
  destinationCellText: String!
  timeCellText: String!
  scheduleCellText: String!
  lodgingCellText: String!
  mealCellText: String!
}

input UserCreateInput {
  name: String!
  email: String
}

input UserUpdateInput {
  name: String
  email: String
  dealStage: DealStage
  dealStageOrder: Int
}

input DealPipelineCardUpdateInput {
  userId: ID!
  dealStage: DealStage!
  dealStageOrder: Int!
}

input DealPipelineReorderInput {
  updates: [DealPipelineCardUpdateInput!]!
}

input UserNoteCreateInput {
  userId: ID!
  content: String!
  createdBy: String!
}
