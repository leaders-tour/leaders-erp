type Plan {
  id: ID!
  regionId: String!
  variantType: VariantType!
  totalDays: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
  region: Region!
  planStops: [PlanStop!]!
  overrides: [Override!]!
}

input PlanCreateInput {
  regionId: String!
  variantType: VariantType!
  totalDays: Int!
  planStops: [PlanStopNestedInput!]!
}

input PlanUpdateInput {
  variantType: VariantType
  totalDays: Int
  planStops: [PlanStopNestedInput!]
}

type PlanStop {
  id: ID!
  planId: String!
  dateCellText: String!
  destinationCellText: String!
  timeCellText: String!
  scheduleCellText: String!
  lodgingCellText: String!
  mealCellText: String!
  createdAt: DateTime!
  updatedAt: DateTime!
}

input PlanStopNestedInput {
  dateCellText: String!
  destinationCellText: String!
  timeCellText: String!
  scheduleCellText: String!
  lodgingCellText: String!
  mealCellText: String!
}
