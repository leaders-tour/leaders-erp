type Location {
  id: ID!
  regionId: String!
  regionName: String!
  name: [String!]!
  defaultVersionId: String
  defaultLodgingType: String!
  isFirstDayEligible: Boolean!
  isLastDayEligible: Boolean!
  latitude: Float
  longitude: Float
  createdAt: DateTime!
  updatedAt: DateTime!
  region: Region!
  defaultVersion: LocationVersion
  variations: [LocationVersion!]!
  timeBlocks: [TimeBlock!]!
  lodgings: [Lodging!]!
  mealSets: [MealSet!]!
  guide: LocationGuide
}

type LocationVersion {
  id: ID!
  locationId: String!
  versionNumber: Int!
  label: String!
  changeNote: String
  locationNameSnapshot: [String!]!
  regionNameSnapshot: String!
  defaultLodgingType: String!
  firstDayAverageDistanceKm: Float
  firstDayAverageTravelHours: Float
  firstDayMovementIntensity: MovementIntensity
  createdAt: DateTime!
  updatedAt: DateTime!
  location: Location!
  timeBlocks: [TimeBlock!]!
  firstDayTimeBlocks: [TimeBlock!]!
  firstDayEarlyTimeBlocks: [TimeBlock!]!
  lodgings: [Lodging!]!
  mealSets: [MealSet!]!
}

input LocationCreateInput {
  regionId: String!
  name: [String!]!
  defaultLodgingType: String!
  isFirstDayEligible: Boolean
  isLastDayEligible: Boolean
  latitude: Float
  longitude: Float
}

input LocationUpdateInput {
  regionId: String
  name: [String!]
  defaultLodgingType: String
  isFirstDayEligible: Boolean
  isLastDayEligible: Boolean
  latitude: Float
  longitude: Float
}

input LocationProfileTimeSlotInput {
  startTime: String!
  activities: [String!]!
}

input LocationProfileLodgingInput {
  isUnspecified: Boolean
  name: String
  hasElectricity: FacilityAvailability
  hasShower: FacilityAvailability
  hasInternet: FacilityAvailability
}

input LocationProfileMealsInput {
  breakfast: MealOption
  lunch: MealOption
  dinner: MealOption
}

input LocationProfileCreateInput {
  regionId: String!
  name: [String!]!
  isFirstDayEligible: Boolean
  isLastDayEligible: Boolean
  firstDayTimeSlots: [LocationProfileTimeSlotInput!]
  firstDayEarlyTimeSlots: [LocationProfileTimeSlotInput!]
  firstDayAverageDistanceKm: Float
  firstDayAverageTravelHours: Float
  lodging: LocationProfileLodgingInput!
  meals: LocationProfileMealsInput!
}

input LocationProfileUpdateInput {
  regionId: String!
  name: [String!]!
  isFirstDayEligible: Boolean
  isLastDayEligible: Boolean
  firstDayTimeSlots: [LocationProfileTimeSlotInput!]
  firstDayEarlyTimeSlots: [LocationProfileTimeSlotInput!]
  firstDayAverageDistanceKm: Float
  firstDayAverageTravelHours: Float
  lodging: LocationProfileLodgingInput!
  meals: LocationProfileMealsInput!
}

input LocationVersionProfileInput {
  firstDayTimeSlots: [LocationProfileTimeSlotInput!]
  firstDayEarlyTimeSlots: [LocationProfileTimeSlotInput!]
  firstDayAverageDistanceKm: Float
  firstDayAverageTravelHours: Float
  lodging: LocationProfileLodgingInput!
  meals: LocationProfileMealsInput!
}

input LocationVersionCreateInput {
  locationId: String!
  sourceVersionId: String
  label: String!
  changeNote: String
  isFirstDayEligible: Boolean
  isLastDayEligible: Boolean
  profile: LocationVersionProfileInput
}
