type Location {
  id: ID!
  regionId: String!
  regionName: String!
  name: String!
  defaultVersionId: String
  defaultLodgingType: String!
  internalMovementDistance: Int
  latitude: Float
  longitude: Float
  createdAt: DateTime!
  updatedAt: DateTime!
  region: Region!
  defaultVersion: LocationVersion
  variations: [LocationVersion!]!
  timeBlocks: [TimeBlock!]!
  lodgings: [Lodging!]!
  mealSets: [MealSet!]!
  guide: LocationGuide
}

type LocationVersion {
  id: ID!
  locationId: String!
  versionNumber: Int!
  label: String!
  changeNote: String
  locationNameSnapshot: String!
  regionNameSnapshot: String!
  internalMovementDistance: Int
  defaultLodgingType: String!
  createdAt: DateTime!
  updatedAt: DateTime!
  location: Location!
  timeBlocks: [TimeBlock!]!
  lodgings: [Lodging!]!
  mealSets: [MealSet!]!
  safetyNotices: [SafetyNotice!]!
}

input LocationCreateInput {
  regionId: String!
  name: String!
  defaultLodgingType: String!
  internalMovementDistance: Int
  latitude: Float
  longitude: Float
}

input LocationUpdateInput {
  regionId: String
  name: String
  defaultLodgingType: String
  internalMovementDistance: Int
  latitude: Float
  longitude: Float
}

input LocationProfileTimeSlotInput {
  startTime: String!
  activities: [String!]!
}

input LocationProfileLodgingInput {
  isUnspecified: Boolean
  name: String
  hasElectricity: FacilityAvailability
  hasShower: FacilityAvailability
  hasInternet: FacilityAvailability
}

input LocationProfileMealsInput {
  breakfast: MealOption
  lunch: MealOption
  dinner: MealOption
}

input LocationProfileCreateInput {
  regionId: String!
  name: String!
  internalMovementDistance: Int
  timeSlots: [LocationProfileTimeSlotInput!]!
  lodging: LocationProfileLodgingInput!
  meals: LocationProfileMealsInput!
  safetyNoticeIds: [ID!]!
}

input LocationProfileUpdateInput {
  regionId: String!
  name: String!
  internalMovementDistance: Int
  timeSlots: [LocationProfileTimeSlotInput!]!
  lodging: LocationProfileLodgingInput!
  meals: LocationProfileMealsInput!
  safetyNoticeIds: [ID!]!
}

input LocationVersionProfileInput {
  internalMovementDistance: Int
  timeSlots: [LocationProfileTimeSlotInput!]!
  lodging: LocationProfileLodgingInput!
  meals: LocationProfileMealsInput!
}

input LocationVersionCreateInput {
  locationId: String!
  sourceVersionId: String
  label: String!
  changeNote: String
  profile: LocationVersionProfileInput
  safetyNoticeIds: [ID!]
}
