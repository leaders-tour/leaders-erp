type Location {
  id: ID!
  regionId: String!
  regionName: String!
  name: String!
  defaultLodgingType: String!
  latitude: Float
  longitude: Float
  createdAt: DateTime!
  updatedAt: DateTime!
  region: Region!
  timeBlocks: [TimeBlock!]!
  lodgings: [Lodging!]!
  mealSets: [MealSet!]!
}

input LocationCreateInput {
  regionId: String!
  name: String!
  defaultLodgingType: String!
  latitude: Float
  longitude: Float
}

input LocationUpdateInput {
  regionId: String
  name: String
  defaultLodgingType: String
  latitude: Float
  longitude: Float
}

input LocationProfileTimeSlotInput {
  startTime: String!
  activities: [String!]!
}

input LocationProfileLodgingInput {
  isUnspecified: Boolean
  name: String
  hasElectricity: Boolean
  hasShower: Boolean
  hasInternet: Boolean
}

input LocationProfileMealsInput {
  breakfast: MealOption
  lunch: MealOption
  dinner: MealOption
}

input LocationProfileCreateInput {
  regionId: String!
  name: String!
  timeSlots: [LocationProfileTimeSlotInput!]!
  lodging: LocationProfileLodgingInput!
  meals: LocationProfileMealsInput!
}
