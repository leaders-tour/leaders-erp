query Segments {
  segments {
    id
    regionId
    regionName
    fromLocationId
    toLocationId
    defaultVersionId
    averageDistanceKm
    averageTravelHours
    isLongDistance
    scheduleTimeBlocks {
      id
      startTime
      orderIndex
      activities {
        id
        description
        orderIndex
      }
    }
    versions {
      id
      segmentId
      name
      averageDistanceKm
      averageTravelHours
      isLongDistance
      startDate
      endDate
      sortOrder
      isDefault
      scheduleTimeBlocks {
        id
        startTime
        orderIndex
        activities {
          id
          description
          orderIndex
        }
      }
    }
  }
}
