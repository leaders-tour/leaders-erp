mutation CreatePlan($input: PlanCreateInput!) {
  createPlan(input: $input) {
    id
  }
}

mutation UpdatePlan($id: ID!, $input: PlanUpdateInput!) {
  updatePlan(id: $id, input: $input) {
    id
  }
}

mutation CreatePlanVersion($input: PlanVersionCreateInput!) {
  createPlanVersion(input: $input) {
    id
    versionNumber
  }
}

mutation SetCurrentPlanVersion($planId: ID!, $versionId: ID!) {
  setCurrentPlanVersion(planId: $planId, versionId: $versionId) {
    id
    currentVersionId
  }
}

mutation DeletePlan($id: ID!) {
  deletePlan(id: $id)
}
